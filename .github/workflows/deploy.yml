name: build-test-deploy-to-s3
permissions:
  contents: read
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-cypress-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cypress-${{ runner.os }}-cypress-

      - name: Install dependencies
        run: pnpm install

      - name: Install Cypress binary
        run: pnpm exec cypress install

      - name: Run vitest tests
        run: pnpm test

      - name: Create .env File
        run: |
          touch .env
          echo "COSMOS_CONSTRING=${{ secrets.COSMOS_CONSTRING }}" >> .env
          echo "COSMOS_CONTAINER=${{ secrets.COSMOS_CONTAINER }}" >> .env
          echo "COSMOS_DBNAME=${{ secrets.COSMOS_DBNAME }}" >> .env
          echo "IMAGES_PATH=${{ secrets.IMAGES_PATH }}" >> .env
          echo "TZ=Pacific/Auckland" >> .env

      - name: Build
        run: pnpm run build

      - name: Run Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:
          start: pnpm start

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Deploy to AWS S3
        run: aws s3 sync ./out s3://${{ vars.S3_BUCKET }} --quiet --delete
